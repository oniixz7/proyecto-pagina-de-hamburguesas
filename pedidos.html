<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Carrito | BurgerGo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-bar">
            <a class="brand" href="index.html">BurgerGo</a>
            <p class="brand-copy">Revisa tus productos antes de confirmar.</p>
        </div>
        <nav class="main-nav" aria-label="Navegacion principal">
            <ul>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="ofertas.html">Promociones</a></li>
                <li><a class="is-active" href="pedidos.html">Mi Carrito <span class="nav-badge">2</span></a></li>
                <li><a href="login.html">Mi Perfil</a></li>
                <li><a href="registrar.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell page-grid">

        <section class="content-card">
            <p class="eyebrow">Pedido actual</p>
            <h1>Mi carrito</h1>
            <table>
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                        <th>Precio</th>
                        <th>Subtotal</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Hamburguesa Clasica</td>
                        <td>1</td>
                        <td>S/ 12.00</td>
                        <td>S/ 12.00</td>
                    </tr>
                    <tr>
                        <td>Papas Fritas</td>
                        <td>1</td>
                        <td>S/ 8.00</td>
                        <td>S/ 8.00</td>
                    </tr>
                </tbody>
                <tfoot>
                    <tr>
                        <th colspan="3">Total</th>
                        <th>S/ 20.00</th>
                    </tr>
                </tfoot>
            </table>
        </section>

        <section class="form-card">
            <p class="eyebrow">Entrega</p>
            <h2>Datos del pedido</h2>
            <form action="#" method="post">
                <p>
                    <label for="cliente">Nombre del cliente</label>
                    <input type="text" id="cliente" name="cliente" placeholder="Tu nombre completo" required>
                </p>
                <p>
                    <label for="direccion-entrega">Direccion</label>
                    <input type="text" id="direccion-entrega" name="direccion" placeholder="Ingresa tu direccion" required>
                </p>
                <p>
                    <label for="pago">Metodo de pago</label>
                    <select id="pago" name="pago">
                        <option value="efectivo">Efectivo</option>
                        <option value="tarjeta">Tarjeta</option>
                        <option value="yape">Yape</option>
                    </select>
                </p>
                <p class="form-actions">
                    <button type="submit">Confirmar pedido</button>
                </p>
            </form>
        </section>
    </main>
</body>
</html>
