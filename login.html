<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | BurgerGo</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="app-header">
        <div class="brand-bar">
            <a class="brand" href="index.html">BurgerGo</a>
            <p class="brand-copy">Accede a tu perfil y revisa tu historial.</p>
        </div>
        <nav class="main-nav" aria-label="Navegacion principal">
            <ul>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="ofertas.html">Promociones</a></li>
                <li><a href="pedidos.html">Mi Carrito <span class="nav-badge">2</span></a></li>
                <li><a class="is-active" href="login.html">Mi Perfil</a></li>
                <li><a href="registrar.html">Registro</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-shell">
        
        <section class="form-card">
            <p class="eyebrow">Bienvenido de nuevo</p>
            <h1>Iniciar sesion</h1>
            <form action="#" method="post">
                <p>
                    <label for="correo">Correo electronico</label>
                    <input type="email" id="correo" name="correo" placeholder="nombre@correo.com" required>
                </p>
                <p>
                    <label for="clave">Contrasena</label>
                    <input type="password" id="clave" name="clave" placeholder="Ingresa tu contrasena" required>
                </p>
                <p class="form-actions">
                    <button type="submit">Entrar a mi cuenta</button>
                </p>
            </form>
            <p class="helper-text">Si aun no tienes cuenta, puedes <a href="registrar.html">registrarte aqui</a>.</p>
        </section>
    </main>
</body>
</html>
